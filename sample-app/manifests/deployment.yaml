apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo
  namespace: demo
  labels:
    app: gitops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-demo
  template:
    metadata:
      labels:
        app: gitops-demo
    spec:
      containers:
        - name: gitops-demo
          image: ghcr.io/mikeebraga/gitops-demo:v1.0.0 # {"$imagepolicy": "flux-system:gitops-demo"}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
